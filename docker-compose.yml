services:

  # -------------------------------------------------------
  # PHP 8.3 FPM — application Symfony
  # -------------------------------------------------------
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: resa_php
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/app.ini
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET:-changeme_local_secret}
    networks:
      - resa_network
    depends_on:
      db:
        condition: service_healthy

  # -------------------------------------------------------
  # Nginx — serveur web
  # -------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: resa_nginx
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - resa_network
    depends_on:
      - php

  # -------------------------------------------------------
  # MySQL 8 — base de données
  # -------------------------------------------------------
  db:
    image: mysql:8.0
    container_name: resa_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: resa_hotel
      MYSQL_USER: resa_user
      MYSQL_PASSWORD: resa_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - resa_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------
  # phpMyAdmin — interface web pour la BDD
  # Accès : http://localhost:8081
  # -------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: resa_phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: resa_user
      PMA_PASSWORD: resa_password
    networks:
      - resa_network
    depends_on:
      - db

  # -------------------------------------------------------
  # MailHog — capture les emails envoyés en local
  # Interface : http://localhost:8025
  # SMTP      : mailhog:1025 (depuis les containers)
  # -------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: resa_mailhog
    ports:
      - "8025:8025"   # Interface web
      - "1025:1025"   # SMTP
    networks:
      - resa_network

  # -------------------------------------------------------
  # Node — compilation des assets (Webpack Encore + React)
  # Ne tourne pas en continu, on l'utilise avec `docker compose run`
  # -------------------------------------------------------
  node:
    image: node:20-alpine
    container_name: resa_node
    working_dir: /app
    volumes:
      - .:/app
    networks:
      - resa_network
    profiles:
      - tools  # ne démarre pas avec `docker compose up`, seulement si demandé

networks:
  resa_network:
    driver: bridge

volumes:
  db_data:
