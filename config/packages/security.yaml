security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            # jwt: ~  # à activer avec LexikJWTAuthenticationBundle

        backend:
            pattern: ^/admin
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: backend_login
                check_path: backend_login
                default_target_path: backend_dashboard
            logout:
                path: backend_logout
                target: backend_login

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: frontend_login
                check_path: frontend_login
                default_target_path: frontend_home
            logout:
                path: frontend_logout
                target: frontend_home
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/api, roles: PUBLIC_ACCESS }
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
